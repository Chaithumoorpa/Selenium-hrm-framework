# =============================================================================
# Kubernetes — Secret
# Enterprise Selenium HRM Framework
# IMPORTANT: In production, use Vault or sealed-secrets. Never commit real values.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: selenium-hrm-secrets
  namespace: selenium-hrm
  labels:
    app: selenium-hrm-framework
type: Opaque
data:
  # Base64 encoded values — replace with real secrets via CI/CD injection
  # echo -n "Admin" | base64  → QWRtaW4=
  ADMIN_USERNAME: QWRtaW4=
  ADMIN_PASSWORD: YWRtaW4xMjM=
  DOCKER_REGISTRY_TOKEN: REPLACE_WITH_BASE64_ENCODED_TOKEN
