[pytest]
# =============================================================================
# Enterprise Selenium + PyTest HRM Framework — pytest.ini
# =============================================================================

# --- Test Discovery ---
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# --- Default Options ---
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
    --timeout=60
    -p no:warnings

# --- Custom Markers ---
markers =
    smoke:           Smoke test suite — critical path only
    regression:      Full regression test suite
    sanity:          Sanity checks after deployment
    login:           Login module tests
    employee:        Employee module tests
    payroll:         Payroll module tests
    leave:           Leave management tests
    recruitment:     Recruitment module tests
    bvt:             Build Verification Tests
    negative:        Negative / invalid input tests
    security:        Security-related test cases
    slow:            Tests that take > 30 seconds
    flaky:           Known intermittently failing tests (quarantine)
    api:             API-layer test cases
    ui:              UI-layer test cases
    data_driven:     Parametrized data-driven tests
    parallel:        Safe to run in parallel

# --- Timeouts ---
timeout = 120
timeout_method = thread

# --- Logging ---
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
